name: Build and Release SocialLinker

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: # Permite rodar manualmente pelo painel do GitHub!

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows executable (.exe)
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-with-history: false
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'desktop/requirements.txt'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r desktop/requirements.txt
          pip install pyinstaller

      - name: Create Windows ICO icon
        shell: bash
        run: |
          python -c "
          import os
          from PIL import Image
          img_path = 'desktop/ui/sociallinker.jpg'
          ico_path = 'desktop/ui/sociallinker.ico'
          if os.path.exists(img_path):
              img = Image.open(img_path)
              img.save(ico_path, format='ICO', sizes=[(256, 256), (128, 128), (64, 64), (32, 32), (16, 16)])
          else:
              img = Image.new('RGB', (512, 512), color='white')
              from PIL import ImageDraw
              draw = ImageDraw.Draw(img)
              draw.ellipse([40, 40, 472, 472], outline='black', width=16)
              draw.line([40, 256, 472, 256], fill='black', width=16)
              draw.line([256, 40, 256, 472], fill='black', width=16)
              draw.ellipse([100, 40, 412, 472], outline='black', width=12)
              draw.ellipse([160, 40, 352, 472], outline='black', width=12)
              draw.arc([40, 100, 472, 412], 180, 360, fill='black', width=12)
              draw.arc([40, 100, 472, 412], 0, 180, fill='black', width=12)
              img.save(ico_path, format='ICO', sizes=[(256, 256), (128, 128), (64, 64), (32, 32), (16, 16)])
          "

      - name: Build with PyInstaller
        run: |
          cd desktop
          pyinstaller --noconfirm --onedir --windowed --name="SocialLinker" --icon="ui/sociallinker.ico" --add-data "core;core" --add-data "modules;modules" --add-data "ui;ui" sociallinker.py

      - name: Compress into Zip
        shell: powershell
        run: |
          Compress-Archive -Path desktop/dist/SocialLinker -DestinationPath SocialLinker-Windows-v${{ github.ref_name }}.zip

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-binaries
          path: SocialLinker-Windows-v${{ github.ref_name }}.zip

  build-linux:
    name: Build Linux packages (.deb, .rpm, .tar.gz)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'desktop/requirements.txt'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm binutils libx11-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r desktop/requirements.txt
          pip install pyinstaller

      - name: Build Executable with PyInstaller
        run: |
          cd desktop
          pyinstaller --noconfirm --onedir --windowed --name="sociallinker" --add-data "core:core" --add-data "modules:modules" --add-data "ui:ui" sociallinker.py

      - name: Create .tar.gz (Generic Linux binary package)
        run: |
          mkdir -p release-linux
          cp -r desktop/dist/sociallinker release-linux/
          cp desktop/abrir_sociallinker.sh release-linux/ || true
          tar -czf SocialLinker-Linux-v${{ github.ref_name }}.tar.gz -C release-linux sociallinker abrir_sociallinker.sh

      - name: Build Debian Package (.deb)
        run: |
          # Limpa o 'v' inicial se o tag começar com 'v' (ex: v1.1.0 -> 1.1.0) para compatibilidade Debian
          VERSION_CLEAN=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          if [ -z "$VERSION_CLEAN" ]; then
            VERSION_CLEAN="1.1.0"
          fi

          DEB_DIR="deb-package"
          mkdir -p $DEB_DIR/DEBIAN
          mkdir -p $DEB_DIR/usr/bin
          mkdir -p $DEB_DIR/usr/share/sociallinker
          mkdir -p $DEB_DIR/usr/share/applications
          
          # Copy PyInstaller distribution preserving permissions, symlinks, etc.
          cp -a desktop/dist/sociallinker/* $DEB_DIR/usr/share/sociallinker/
          
          # Create start wrapper script
          cat << 'EOF' > $DEB_DIR/usr/bin/sociallinker
          #!/bin/bash
          /usr/share/sociallinker/sociallinker "$@"
          EOF
          chmod +x $DEB_DIR/usr/bin/sociallinker

          # Crucial: Ensure the main packaged PyInstaller binary and all dependencies are fully readable and executable!
          chmod -R a+rX $DEB_DIR/usr/share/sociallinker/
          chmod +x $DEB_DIR/usr/share/sociallinker/sociallinker
          
          # Create icon directories inside package
          mkdir -p $DEB_DIR/usr/share/pixmaps
          mkdir -p $DEB_DIR/usr/share/icons/hicolor/512x512/apps

          # Convert desktop JPG icon to high-quality transparent PNG launcher icons
          python3 -c "
          import os
          from PIL import Image, ImageDraw
          img_path = 'desktop/ui/sociallinker.jpg'
          deb_dir = 'deb-package'
          pixmap_path = f'{deb_dir}/usr/share/pixmaps/sociallinker.png'
          icon_path = f'{deb_dir}/usr/share/icons/hicolor/512x512/apps/sociallinker.png'
          
          # Garante que as pastas de destino existam
          os.makedirs(os.path.dirname(pixmap_path), exist_ok=True)
          os.makedirs(os.path.dirname(icon_path), exist_ok=True)
          
          if os.path.exists(img_path):
              img = Image.open(img_path)
              img.save(pixmap_path, 'PNG')
              img.save(icon_path, 'PNG')
          else:
              img = Image.new('RGB', (512, 512), color='white')
              draw = ImageDraw.Draw(img)
              draw.ellipse([40, 40, 472, 472], outline='black', width=16)
              draw.line([40, 256, 472, 256], fill='black', width=16)
              draw.line([256, 40, 256, 472], fill='black', width=16)
              draw.ellipse([100, 40, 412, 472], outline='black', width=12)
              draw.ellipse([160, 40, 352, 472], outline='black', width=12)
              draw.arc([40, 100, 472, 412], 180, 360, fill='black', width=12)
              draw.arc([40, 100, 472, 412], 0, 180, fill='black', width=12)
              img.save(pixmap_path, 'PNG')
              img.save(icon_path, 'PNG')
          "

          # Create Control file (Declaring critical dependencies for PySide6/Qt6 runtime)
          cat << EOF > $DEB_DIR/DEBIAN/control
          Package: sociallinker
          Version: $VERSION_CLEAN
          Architecture: amd64
          Maintainer: tiagorabelosels@gmail.com
          Depends: libxcb-cursor0, libxkbcommon-x11-0, libgl1, libegl1, libfontconfig1, libdbus-1-3
          Description: SocialLinker - O Gerador de QR Codes Artísticos e Links Personalizados mais completo e offline.
          Section: utils
          Priority: optional
          EOF
          
          # Create desktop shortcut
          cat << EOF > $DEB_DIR/usr/share/applications/sociallinker.desktop
          [Desktop Entry]
          Name=SocialLinker
          Comment=Gerador de QR Codes Artísticos e Customizados
          Exec=/usr/bin/sociallinker
          Terminal=false
          Type=Application
          Categories=Utility;Graphics;
          Icon=sociallinker
          EOF
          
          # Build .deb package
          dpkg-deb --build $DEB_DIR sociallinker_v${{ github.ref_name }}_amd64.deb

      - name: Build RPM Package (.rpm)
        run: |
          # Install alien tool to cleanly convert .deb to .rpm
          sudo apt-get install -y alien
          sudo alien --to-rpm --scripts sociallinker_v${{ github.ref_name }}_amd64.deb
          # Rename the produced RPM to a cleaner name
          mv sociallinker-*.rpm sociallinker_v${{ github.ref_name }}_amd64.rpm

      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-binaries
          path: |
            SocialLinker-Linux-v${{ github.ref_name }}.tar.gz
            sociallinker_v${{ github.ref_name }}_amd64.deb
            sociallinker_v${{ github.ref_name }}_amd64.rpm

  create-release:
    name: Create GitHub Release and Upload Assets
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') # Apenas cria Release real se for por Tag de versão!
    steps:
      - name: Download Windows Artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-binaries
          path: ./

      - name: Download Linux Artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-binaries
          path: ./

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: SocialLinker Release ${{ github.ref_name }}
          body: |
            ## 🎉 SocialLinker ${{ github.ref_name }} lançado!
            
            Este lançamento traz atualizações incríveis para o gerador de QR codes off-line mais completo do mercado!
            
            ### ✨ O que há de novo:
            - **Gota de Sangue / Água Super Realista**: Silhueta inspirada em design vetorial profissional, com curvas e pontas perfeitas.
            - **Estilos de Pixels Exclusivos**: Módulos fluidos (estilo lambuzo de tinta), cantos arredondados, corações e estrelas cheias.
            - **Escaneabilidade Garantida**: Algoritmo que desenha marcas d'água suaves de contraste, mantendo o formato sem perder a leitura óptica da câmera!
            
            ---
            
            ### 📦 Arquivos para Download:
            - **Windows (`.zip` com `.exe`)**: Extraia o arquivo e execute o `SocialLinker.exe` para rodar diretamente.
            - **Debian / Ubuntu (`.deb`)**: Instale facilmente usando `sudo dpkg -i sociallinker_..._amd64.deb`.
            - **RedHat / Fedora (`.rpm`)**: Instale facilmente usando `sudo rpm -i sociallinker_..._amd64.rpm`.
            - **Generic Linux / Arch (`.tar.gz`)**: Descompacte e execute diretamente de qualquer distribuição Linux.
          files: |
            SocialLinker-Windows-v${{ github.ref_name }}.zip
            sociallinker_v${{ github.ref_name }}_amd64.deb
            sociallinker_v${{ github.ref_name }}_amd64.rpm
            SocialLinker-Linux-v${{ github.ref_name }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
